<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="p-bronze" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFD080"/>
    <stop offset="100%" stop-color="#F0A030"/>
  </linearGradient>
  <linearGradient id="p-silver" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#D0E8F8"/>
    <stop offset="100%" stop-color="#90B8D0"/>
  </linearGradient>
  <linearGradient id="p-gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFF0A0"/>
    <stop offset="100%" stop-color="#FFD040"/>
  </linearGradient>
  <linearGradient id="p-plat" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#C0E8FF"/>
    <stop offset="100%" stop-color="#70C0F0"/>
  </linearGradient>
  <linearGradient id="p-dia" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#90D8FF"/>
  </linearGradient>
  <linearGradient id="p-ruby" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFAAAA"/>
    <stop offset="100%" stop-color="#FF4060"/>
  </linearGradient>
</defs>

<!-- BG -->
<rect width="600" height="180" rx="16" fill="#1A1A2E"/>

<!-- Title -->
<text x="300" y="30" text-anchor="middle" font-family="'Be Vietnam Pro',Arial,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="2">PROGRESS BAR COMPONENT</text>

<!-- Bronze -->
<circle cx="36" cy="62" r="10" fill="#CD7F32"/>
<rect x="56" y="56" width="460" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
<rect x="56" y="56" width="4" height="12" rx="6" fill="url(#p-bronze)"/>
<text x="530" y="67" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">0%</text>
<text x="36" y="85" text-anchor="middle" font-family="'Be Vietnam Pro',Arial,sans-serif" font-size="9" fill="#CD7F32">Đồng</text>

<!-- Silver -->
<circle cx="36" cy="105" r="10" fill="#A8B8C4"/>
<rect x="56" y="99" width="460" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
<rect x="56" y="99" width="138" height="12" rx="6" fill="url(#p-silver)"/>
<text x="530" y="110" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">30%</text>
<text x="36" y="128" text-anchor="middle" font-family="'Be Vietnam Pro',Arial,sans-serif" font-size="9" fill="#A8B8C4">Bạc</text>

<!-- Gold -->
<circle cx="36" cy="148" r="10" fill="#D4A020"/>
<rect x="56" y="142" width="460" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
<rect x="56" y="142" width="276" height="12" rx="6" fill="url(#p-gold)"/>
<text x="530" y="153" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">60%</text>
<text x="36" y="171" text-anchor="middle" font-family="'Be Vietnam Pro',Arial,sans-serif" font-size="9" fill="#D4A020">Vàng</text>
</svg>
